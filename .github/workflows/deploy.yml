name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main, dev, test, unstable]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/kv
      cache-key: kv
    secrets: inherit
